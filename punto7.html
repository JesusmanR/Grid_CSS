<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería dinámica con Grid</title>
    <link rel="stylesheet" href="stylespto7.css">
</head>
<body>
    <h1>Galería de imágenes adaptable</h1>
    <p>Redimensiona la ventana para ver cómo se reestructuran las columnas automáticamente.</p>

    <div class="galeria">
        <img src="https://picsum.photos/300/200?random=1" alt="Imagen 1">
        <img src="https://picsum.photos/300/300?random=2" alt="Imagen 2">
        <img src="https://picsum.photos/300/250?random=3" alt="Imagen 3">
        <img src="https://picsum.photos/300/180?random=4" alt="Imagen 4">
        <img src="https://picsum.photos/300/220?random=5" alt="Imagen 5">
        <img src="https://picsum.photos/300/280?random=6" alt="Imagen 6">
        <img src="https://picsum.photos/300/310?random=7" alt="Imagen 7">
        <img src="https://picsum.photos/300/190?random=8" alt="Imagen 8">
        
    </div>
</body>
</html>
